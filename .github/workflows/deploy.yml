name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "${{ secrets.PRIVATE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 18005 lemarc.fr >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=yes -p 18005 Marc@lemarc.fr << 'EOF_REMOTE'
            set -e
            cd /home/Marc/Web/Carte_reseau/
            git pull --ff-only
            npm install
            npm run build
            sudo -n systemctl restart carte_reseau.service
          EOF_REMOTE
