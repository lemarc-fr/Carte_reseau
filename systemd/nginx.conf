server {
    listen 80;
    listen 443 ssl;
    server_name carte_reseau.lemarc.fr;

    # Certificats à fournir séparément (pas de gestion SSL automatisée ici)
    ssl_certificate /etc/nginx/ssl/carte_reseau.lemarc.fr.crt;
    ssl_certificate_key /etc/nginx/ssl/carte_reseau.lemarc.fr.key;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    access_log /var/log/nginx/carte_reseau.access.log;
    error_log /var/log/nginx/carte_reseau.error.log;
}
